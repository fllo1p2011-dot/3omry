<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Yara ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    background:url("lips.jpg") no-repeat center center/cover;
    min-height:100vh;
    overflow-y:auto;
}

/* ---------------- Login ---------------- */
.overlay{
    background:rgba(0,0,0,0.75);
    width:100%;
    padding:40px 0;
    position:relative;
}

h1{
    font-size:60px;
    background:linear-gradient(45deg,#ff4da6,#9b59ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin:10px 0;
}

p{
    font-size:18px;
    margin:10px 0;
}

input{
    width:280px;
    padding:15px;
    border-radius:40px;
    border:2px solid #ff3f8e;
    background:black;
    color:white;
    text-align:center;
    font-size:18px;
    box-shadow:0 0 15px #ff3f8e;
    outline:none;
}

button{
    margin-top:15px;
    padding:12px 35px;
    border:none;
    border-radius:40px;
    font-size:18px;
    color:white;
    background:linear-gradient(45deg,#ff3f8e,#8e5cff);
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

/* hearts */
.heart{
    position:fixed;
    bottom:-20px;
    color:#ff4da6;
    animation: floatHearts linear forwards;
    pointer-events:none;
}

@keyframes floatHearts{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

/* ---------------- Main Page ---------------- */
#main{
    display:none;
    padding:20px 0;
}

.card{
    width:80%;
    margin:auto;
    padding:25px;
    background:rgba(0,0,0,0.65);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.2);
    font-size:22px;
    line-height:1.8;
    margin-bottom:20px;
}

.songtitle{
    margin-top:15px;
    font-size:20px;
    color:#ffd6e7;
}

.timer{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:25px;
}

.box{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
    width:70px;
}

.number{
    font-size:28px;
    color:#ff4da6;
}

.interactive-buttons{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.memory-gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:25px;
}

.memory-gallery img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:15px;
    cursor:pointer;
    border:2px solid #ff4da6;
    transition:0.3s;
}

.memory-gallery img:hover{
    transform:scale(1.1);
}

/* ---------------- Surprise Page ---------------- */
#surprise{
    display:none;
    padding:20px;
}

.surprise-title{
    font-size:28px;
    margin-bottom:20px;
}

.surprise-gallery{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    overflow-y:auto;
    max-height:80vh;
    padding-bottom:30px;
}

.surprise-gallery img{
    width:250px;
    height:150px;
    object-fit:cover;
    border-radius:15px;
    border:2px solid #ff4da6;
}

.surprise-gallery span{
    display:block;
    margin-bottom:5px;
    font-size:20px;
    color:#ffd6e7;
}

/* ---------------- LOVE PAGE ---------------- */
#lovePage{
    display:none;
    background:black;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    overflow:hidden;
}

#loveCircle{
    width:300px;
    height:150px;
    border-radius:150px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    color:#ff0033;
    font-family:'Great Vibes',cursive;
    text-align:center;
    cursor:pointer;
}

canvas{
    position:absolute;
}

.loveText{
    position:fixed;
    bottom:-50px;
    color:red;
    font-size:30px;
    animation:loveUp 4s linear forwards;
    pointer-events:none;
}

@keyframes loveUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

</style>
</head>

<body>

<!-- ------------------- Login ------------------- -->
<div class="overlay" id="login">
<h1>Yara</h1>
<p>منطقة محمية.. أدخل الرمز السري</p>
<input type="password" id="pass" placeholder="****">
<br>
<button onclick="login()">فتح الموقع</button>
</div>

<!-- ------------------- Main ------------------- -->
<div id="main">

<h1>Yara</h1>

<div class="card">
إلى الشخص الذي غير حياتي للأجمل..<br><br>
هذا الموقع الصغير هو محاولة بسيطة لأقول لك:<br><br>
<b>"كل عام وأنت معي"</b>
</div>

<div class="songtitle">
أكتر أغنية بتفكرني بيكي يا عمري وبأحسن أوقاتنا ❤️
</div>

<audio controls>
<source src="again.mp3" type="audio/mpeg">
</audio>

<div class="timer">

<div class="box">
<div class="number" id="days">0</div>
يوم
</div>

<div class="box">
<div class="number" id="hours">0</div>
ساعة
</div>

<div class="box">
<div class="number" id="minutes">0</div>
دقيقة
</div>

<div class="box">
<div class="number" id="seconds">0</div>
ثانية
</div>

</div>

<div class="interactive-buttons">
<button onclick="changeBackground()">تغيير الخلفية</button>
<button onclick="bigHearts()">💖 مفاجأة القلوب 💖</button>
<button onclick="newMessage()">رسالة جديدة</button>
</div>

<div class="memory-gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
</div>

<div style="margin-top:40px;">
<button onclick="showSurprise()">وهنا مفاجأة ليكي 🤓💗</button>
</div>

<div style="margin-top:20px;">
<button onclick="showLove()">وهنا شويه دلع ليكي 🤓💗</button>
</div>

</div>

<!-- ------------------- Surprise Page ------------------- -->
<div id="surprise">

<div class="surprise-title">الورد اللي بتحبيه 🤓💗</div>

<div class="surprise-gallery">

<div><span>𝑻𝒖𝒍𝒊𝒑 𝑭𝒍𝒐𝒘𝒆𝒓</span><img src="rose1.jpg"></div>
<div><img src="rose2.jpg"></div>
<div><img src="rose3.jpg"></div>
<div><img src="rose4.jpg"></div>
<div><img src="rose5.jpg"></div>
<div><img src="rose6.jpg"></div>
<div><img src="rose7.jpg"></div>
<div><img src="rose8.jpg"></div>
<div><img src="rose9.jpg"></div>
<div><img src="rose10.jpg"></div>

</div>
</div>

<!-- ------------------- LOVE PAGE ------------------- -->
<div id="lovePage">
<h1 id="loveCircle">I Love You Yara</h1>
<canvas id="canvas"></canvas>
<audio id="loveAudio" src="love.mp3" autoplay></audio>
</div>

<script>
/* ------------------- Login ------------------- */
function login(){
    let password=document.getElementById("pass").value;
    if(password.length>0){
        document.getElementById("login").style.display="none";
        document.getElementById("main").style.display="block";
    }
}

/* ------------------- Timer ------------------- */
let startDate=new Date("2025-04-25T09:00:00");
function updateTimer(){
    let now=new Date();
    let diff=now-startDate;
    let days=Math.floor(diff/(1000*60*60*24));
    let hours=Math.floor((diff/(1000*60*60))%24);
    let minutes=Math.floor((diff/(1000*60))%60);
    let seconds=Math.floor((diff/1000)%60);
    document.getElementById("days").innerText=days;
    document.getElementById("hours").innerText=hours;
    document.getElementById("minutes").innerText=minutes;
    document.getElementById("seconds").innerText=seconds;
}
setInterval(updateTimer,1000);

/* ------------------- Hearts ------------------- */
function createHeart(){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+10)+"px";
    heart.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>{ heart.remove(); },6000);
}
setInterval(createHeart,400);

/* ------------------- Interactive Buttons ------------------- */
function changeBackground(){
    let colors=["url('lips.jpg')","url('bg2.jpg')","url('bg3.jpg')"];
    let next=colors[Math.floor(Math.random()*colors.length)];
    document.body.style.backgroundImage=next;
}

function bigHearts(){
    for(let i=0;i<20;i++){
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"vw";
        heart.style.fontSize=(Math.random()*30+15)+"px";
        heart.style.animationDuration=(Math.random()*2+2)+"s";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),5000);
    }
}

function newMessage(){
    let card=document.querySelector(".card");
    const messages=[
        "بحبك يا عمري💗",
        "يا أحلى عيووون",
        "أنت أجمل حاجة حصلتلي في حياتي 🌹",
        "𝐘𝐨𝐮 𝐚𝐫𝐞 𝐞𝐧𝐨𝐮𝐠𝐡 𝐟𝐨𝐫 𝐦𝐞 💖🌷",
        "بس فيه حاجه مستغربها بعيد عن كل دا انت ازاي في اولاد صجر انت مكانك 🤓✋🏿في قلبي"
    ];
    let msg=messages[Math.floor(Math.random()*messages.length)];
    card.innerHTML=msg;
}

/* ------------------- Surprise ------------------- */
function showSurprise(){
    document.getElementById("main").style.display="none";
    document.getElementById("surprise").style.display="block";
}

/* ------------------- LOVE PAGE ------------------- */
function showLove(){
    document.getElementById("main").style.display="none";
    document.getElementById("lovePage").style.display="flex";

    // تشغيل الصوت مباشرة
    const audio = document.getElementById("loveAudio");
    audio.play();

    startLoveAnimation();
}

/* Canvas hearts for LOVE PAGE */
function startLoveAnimation(){
    const canvas=document.getElementById("canvas");
    const ctx=canvas.getContext("2d");

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

    let heartsArr=[];

    class Heart{
        constructor(){
            this.x=Math.random()*canvas.width;
            this.y=Math.random()*canvas.height;
            this.size=Math.random()*8+4;
            this.speedY=Math.random()*1+0.3;
        }
        draw(){
            ctx.fillStyle="red";
            ctx.beginPath();
            ctx.moveTo(this.x,this.y);
            ctx.arc(this.x-this.size/2,this.y-this.size/2,this.size/2,0,Math.PI);
            ctx.arc(this.x+this.size/2,this.y-this.size/2,this.size/2,0,Math.PI);
            ctx.lineTo(this.x,this.y+this.size);
            ctx.fill();
        }
        update(){
            this.y-=this.speedY;
            if(this.y<0){ this.y=canvas.height; this.x=Math.random()*canvas.width; }
            this.draw();
        }
    }

    for(let i=0;i<120;i++){
        heartsArr.push(new Heart());
    }

    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        heartsArr.forEach(h=>h.update());
        requestAnimationFrame(animate);
    }
    animate();
}

</script>
</body>
</html>
