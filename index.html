<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Yara ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    background:url("lips.jpg") no-repeat center center/cover;
    min-height:100vh;
    overflow-y:auto;
}

.overlay{
    background:rgba(0,0,0,0.75);
    width:100%;
    padding:40px 0;
    position:relative;
}

h1{
    font-size:60px;
    background:linear-gradient(45deg,#ff4da6,#9b59ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin:10px 0;
}

p{
    font-size:18px;
    margin:10px 0;
}

input{
    width:280px;
    padding:15px;
    border-radius:40px;
    border:2px solid #ff3f8e;
    background:black;
    color:white;
    text-align:center;
    font-size:18px;
    box-shadow:0 0 15px #ff3f8e;
    outline:none;
}

button{
    margin-top:15px;
    padding:12px 35px;
    border:none;
    border-radius:40px;
    font-size:18px;
    color:white;
    background:linear-gradient(45deg,#ff3f8e,#8e5cff);
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

/* ------------------- Main Page ------------------- */
#main{
    display:none;
    padding:20px 0;
}

.card{
    width:80%;
    margin:auto;
    padding:25px;
    background:rgba(0,0,0,0.65);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.2);
    font-size:22px;
    line-height:1.8;
    margin-bottom:20px;
}

.songtitle{
    margin-top:15px;
    font-size:20px;
    color:#ffd6e7;
}

.timer{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:25px;
}

.box{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
    width:70px;
}

.number{
    font-size:28px;
    color:#ff4da6;
}

.interactive-buttons{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.memory-gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:25px;
}

.memory-gallery img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:15px;
    cursor:pointer;
    border:2px solid #ff4da6;
    transition:0.3s;
}

.memory-gallery img:hover{
    transform:scale(1.1);
}

/* ------------------- Surprise Page ------------------- */
#surprise{
    display:none;
    padding:20px;
}

.surprise-title{
    font-size:28px;
    margin-bottom:20px;
}

.surprise-gallery{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    overflow-y:auto;
    max-height:80vh;
    padding-bottom:30px;
}

.surprise-gallery img{
    width:250px;
    height:150px;
    object-fit:cover;
    border-radius:15px;
    border:2px solid #ff4da6;
}

.surprise-gallery span{
    display:block;
    margin-bottom:5px;
    font-size:20px;
    color:#ffd6e7;
}
</style>
</head>

<body>

<!-- ------------------- Login ------------------- -->
<div class="overlay" id="login">
<h1>Yara</h1>
<p>منطقة محمية.. أدخل الرمز السري</p>
<input type="password" id="pass" placeholder="****">
<br>
<button onclick="login()">فتح الموقع</button>
</div>

<!-- ------------------- Main ------------------- -->
<div id="main">
<h1>Yara</h1>

<div class="card">
إلى الشخص الذي غير حياتي للأجمل..<br><br>
هذا الموقع الصغير هو محاولة بسيطة لأقول لك:<br><br>
<b>"كل عام وأنت معي"</b>
</div>

<div class="songtitle">
أكتر أغنية بتفكرني بيكي يا عمري وبأحسن أوقاتنا ❤️
</div>

<audio controls>
<source src="again.mp3" type="audio/mpeg">
</audio>

<div class="timer">
<div class="box">
<div class="number" id="days">0</div>
يوم
</div>
<div class="box">
<div class="number" id="hours">0</div>
ساعة
</div>
<div class="box">
<div class="number" id="minutes">0</div>
دقيقة
</div>
<div class="box">
<div class="number" id="seconds">0</div>
ثانية
</div>
</div>

<div class="interactive-buttons">
<button onclick="changeBackground()">تغيير الخلفية</button>
<button onclick="bigHearts()">💖 مفاجأة القلوب 💖</button>
<button onclick="newMessage()">رسالة جديدة</button>
</div>

<div class="memory-gallery" id="gallery">
<img src="photo1.jpg" alt="ذكرى 1">
<img src="photo2.jpg" alt="ذكرى 2">
<img src="photo3.jpg" alt="ذكرى 3">
</div>

<!-- ------------------- Surprise Button ------------------- -->
<div style="margin-top:40px;">
<button onclick="showSurprise()">وهنا مفاجأة ليكي 🤓💗</button>
</div>
</div>

<!-- ------------------- Surprise Page ------------------- -->
<div id="surprise">
<div class="surprise-title">الورد اللي بتحبيه 🤓💗</div>
<div class="surprise-gallery">
<div><span> 𝑻𝒖𝒍𝒊𝒑 𝑭𝒍𝒐𝒘𝒆𝒓</span><img src="rose1.jpg"></div>
<div><span> </span><img src="rose2.jpg"></div>
<div><span> </span><img src="rose3.jpg"></div>
<div><span> </span><img src="rose4.jpg"></div>
<div><span> </span><img src="rose5.jpg"></div>
<div><span> </span><img src="rose6.jpg"></div>
<div><span> </span><img src="rose7.jpg"></div>
<div><span></span><img src="rose8.jpg"></div>
<div><span> </span><img src="rose9.jpg"></div>
<div><span>  </span><img src="rose10.jpg"></div>
</div>
</div>

<script>
// ------------------- Login -------------------
function login(){
    let password=document.getElementById("pass").value;
    if(password.length>0){
        document.getElementById("login").style.display="none";
        document.getElementById("main").style.display="block";
    }
}

// ------------------- Timer -------------------
let startDate=new Date("2025-04-25T09:00:00");
function updateTimer(){
    let now=new Date();
    let diff=now-startDate;

    let days=Math.floor(diff/(1000*60*60*24));
    let hours=Math.floor((diff/(1000*60*60))%24);
    let minutes=Math.floor((diff/(1000*60))%60);
    let seconds=Math.floor((diff/1000)%60);

    document.getElementById("days").innerText=days;
    document.getElementById("hours").innerText=hours;
    document.getElementById("minutes").innerText=minutes;
    document.getElementById("seconds").innerText=seconds;
}
setInterval(updateTimer,1000);

// ------------------- Hearts -------------------
function createHeart(){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+10)+"px";
    heart.style.animationDuration=(Math.random()*3+3)+"s";
    document.getElementById("login").appendChild(heart);
    setTimeout(()=>{ heart.remove(); },6000);
}
setInterval(createHeart,400);

// ------------------- Interactive Buttons -------------------
function changeBackground(){
    let colors=["url('lips.jpg')","url('bg2.jpg')","url('bg3.jpg')"];
    let current=document.body.style.backgroundImage;
    let next=colors[Math.floor(Math.random()*colors.length)];
    document.body.style.backgroundImage=next;
}

function bigHearts(){
    for(let i=0;i<20;i++){
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"vw";
        heart.style.fontSize=(Math.random()*30+15)+"px";
        heart.style.animationDuration=(Math.random()*2+2)+"s";
        document.getElementById("main").appendChild(heart);
        setTimeout(()=>heart.remove(),5000);
    }
}

function newMessage(){
    let card=document.querySelector(".card");
    const messages=[
        "بحبك يا عمري💗  ",
        "يا أحلى عيووون
        
        ",
        "أنت أجمل حاجة حصلتلي في حياتي 🌹",
        " 𝐘𝐨𝐮 𝐚𝐫𝐞 𝐞𝐧𝐨𝐮𝐠𝐡 𝐟𝐨𝐫 𝐦𝐞 💖🌷"
        " بس فيه حاجه مستغربها بعيد عن كل دا انت ازاي في اولاد صجر انت مكانك 🤓✋🏿في قلبي  "
    ];
    let msg=messages[Math.floor(Math.random()*messages.length)];
    card.innerHTML=msg;
}

// ------------------- Surprise -------------------
function showSurprise(){
    document.getElementById("main").style.display="none";
    document.getElementById("surprise").style.display="block";
}
</script>
</body>
</html>
